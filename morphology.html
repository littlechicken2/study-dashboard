<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#0b1014">
  <title>法语词形训练</title>
  <style>
    :root{--bg:#0b1014;--panel:#121a20;--panel2:#18232a;--line:#2c3c45;--text:#f5f7f8;--muted:#9fb0ba;--green:#65e3a1;--blue:#69a7ff;--red:#ff6b6b;--yellow:#ffd166}
    *{box-sizing:border-box}
    body{margin:0;color:var(--text);background:radial-gradient(circle at 8% 0,rgba(105,167,255,.16),transparent 30rem),radial-gradient(circle at 90% 4%,rgba(101,227,161,.13),transparent 26rem),var(--bg);font-family:Inter,"Segoe UI","Microsoft YaHei",sans-serif}
    button,input{font:inherit}
    button{border:0;cursor:pointer}
    main{width:1180px;max-width:calc(100% - 24px);margin:auto;padding:16px 0 24px}
    header{display:flex;justify-content:space-between;align-items:flex-end;gap:16px;margin-bottom:12px}
    h1{margin:0;font-size:28px;line-height:1}
    h2{margin:0;font-size:18px}
    h3{margin:0 0 8px;font-size:15px}
    p{margin:0}
    a{color:var(--blue)}
    .muted{color:var(--muted)}
    .pill{display:inline-flex;align-items:center;min-height:32px;padding:0 11px;border-radius:6px;background:#1b2830;color:var(--text);text-decoration:none;font-weight:800}
    .layout{display:grid;grid-template-columns:220px 1fr 310px;gap:10px;align-items:start}
    .panel{border:1px solid var(--line);border-radius:8px;background:rgba(18,26,32,.94);overflow:hidden}
    .pad{padding:14px}
    .modeGrid{display:grid;gap:8px}
    .modeBtn{min-height:64px;padding:12px;border-radius:7px;background:var(--panel2);color:var(--text);text-align:left;font-weight:850}
    .modeBtn span{display:block;margin-top:4px;color:var(--muted);font-size:12px;font-weight:500}
    .modeBtn.active{background:linear-gradient(90deg,var(--blue),var(--green));color:#06110d}
    .modeBtn.active span{color:#092018}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:12px}
    .stat{padding:9px;border-radius:6px;background:#0d151a}
    .stat b{display:block;font-size:21px;font-variant-numeric:tabular-nums}
    .stat span{display:block;color:var(--muted);font-size:11px}
    .toolbar{display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 14px;border-bottom:1px solid var(--line);background:rgba(24,35,42,.68)}
    .ghost,.primary{min-height:38px;padding:0 14px;border-radius:6px;background:#20303a;color:var(--text);font-weight:850}
    .primary{background:linear-gradient(90deg,var(--green),var(--blue));color:#06110d}
    .question{padding:28px 28px 18px}
    .word{font-size:58px;font-weight:900;line-height:1.05}
    .hint{margin-top:8px;color:var(--muted)}
    .chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:12px}
    .chip{min-height:34px;padding:0 12px;border-radius:18px;background:#0d151a;color:var(--muted);font-size:13px}
    .choiceBlock,.form{padding:0 28px 22px}
    .choiceGroup{margin-top:12px}
    .choiceGroup h3{color:var(--muted)}
    .choices{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px}
    .choice{min-height:44px;border-radius:6px;background:#20303a;color:var(--text);font-weight:850}
    .choice.selected{outline:2px solid var(--blue)}
    .choice.good{background:rgba(101,227,161,.24);outline:2px solid var(--green)}
    .choice.bad{background:rgba(255,107,107,.22);outline:2px solid var(--red)}
    .formGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    label{display:grid;gap:5px;color:var(--muted);font-size:12px}
    input{width:100%;min-height:42px;padding:8px 10px;border:1px solid var(--line);border-radius:6px;background:#091116;color:var(--text)}
    .actions{display:flex;gap:10px;padding:0 28px 24px}
    .actions button{flex:1}
    .feedback{margin:0 28px 24px;padding:12px;border-radius:7px;background:#0d151a;color:var(--muted);line-height:1.55}
    .feedback.ok{border:1px solid rgba(101,227,161,.45);color:#c9ffe2}
    .feedback.no{border:1px solid rgba(255,107,107,.45);color:#ffd7d7}
    .rules{display:grid;gap:8px;max-height:660px;overflow:auto}
    .rule{padding:11px;border-radius:7px;background:#0d151a}
    .rule b{display:block;margin-bottom:4px;color:#fff}
    .rule code{color:var(--yellow);font-family:Consolas,monospace}
    .search{display:grid;gap:8px;margin-top:12px}
    .sideList{display:grid;gap:8px;max-height:220px;overflow:auto}
    .entry{padding:9px;border-radius:6px;background:#0d151a}
    .entry b{display:block}
    .entry span{display:block;color:var(--muted);font-size:12px;margin-top:3px}
    .small{font-size:12px;color:var(--muted)}
    @media(max-width:980px){.layout{grid-template-columns:1fr}.word{font-size:42px}.formGrid{grid-template-columns:1fr}.rules{max-height:none}}
  </style>
</head>
<body>
<main>
  <header>
    <div>
      <h1>法语词形训练</h1>
      <p class="muted">Anki 负责记忆；这里负责识别词性、性数、时态和反复输出变化。</p>
    </div>
    <a class="pill" href="index.html">返回监督台</a>
  </header>

  <section class="layout">
    <aside class="panel pad">
      <div class="modeGrid">
        <button class="modeBtn active" data-mode="identify">识别选择<span>给一个词，选择词性/性数/时态</span></button>
        <button class="modeBtn" data-mode="produce">变化输出<span>给规则或不规则项，写完整变化</span></button>
      </div>
      <div class="stats" id="todayStats"></div>
      <p class="small" id="dataSource" style="margin-top:12px">正在读取 Anki...</p>
      <div class="search">
        <h2>搜索</h2>
        <input id="searchInput" placeholder="chercher / maison / 工作">
        <div class="sideList" id="searchResults"></div>
      </div>
    </aside>

    <section class="panel">
      <div class="toolbar">
        <div>
          <h2 id="modeTitle">识别选择</h2>
          <p class="small" id="modeHint">看到一个法语词，选择它的语法身份。</p>
        </div>
        <button class="ghost" id="nextBtn" type="button">下一题</button>
      </div>
      <div id="trainerBody"></div>
    </section>

    <aside class="panel pad">
      <h2>精简变化规则</h2>
      <div class="rules" id="rules"></div>
    </aside>
  </section>
</main>

<script>
const IRREGULAR={
  etre:{inf:"être",zh:"是",present:{je:"suis",tu:"es",il:"est",nous:"sommes",vous:"êtes",ils:"sont"},past:"été"},
  avoir:{inf:"avoir",zh:"有",present:{je:"ai",tu:"as",il:"a",nous:"avons",vous:"avez",ils:"ont"},past:"eu"},
  aller:{inf:"aller",zh:"去",present:{je:"vais",tu:"vas",il:"va",nous:"allons",vous:"allez",ils:"vont"},past:"allé"},
  faire:{inf:"faire",zh:"做",present:{je:"fais",tu:"fais",il:"fait",nous:"faisons",vous:"faites",ils:"font"},past:"fait"},
  pouvoir:{inf:"pouvoir",zh:"能够",present:{je:"peux",tu:"peux",il:"peut",nous:"pouvons",vous:"pouvez",ils:"peuvent"},past:"pu"},
  vouloir:{inf:"vouloir",zh:"想要",present:{je:"veux",tu:"veux",il:"veut",nous:"voulons",vous:"voulez",ils:"veulent"},past:"voulu"},
  venir:{inf:"venir",zh:"来",present:{je:"viens",tu:"viens",il:"vient",nous:"venons",vous:"venez",ils:"viennent"},past:"venu"},
  prendre:{inf:"prendre",zh:"拿/乘坐",present:{je:"prends",tu:"prends",il:"prend",nous:"prenons",vous:"prenez",ils:"prennent"},past:"pris"},
  voir:{inf:"voir",zh:"看见",present:{je:"vois",tu:"vois",il:"voit",nous:"voyons",vous:"voyez",ils:"voient"},past:"vu"},
  savoir:{inf:"savoir",zh:"知道",present:{je:"sais",tu:"sais",il:"sait",nous:"savons",vous:"savez",ils:"savent"},past:"su"},
  devoir:{inf:"devoir",zh:"必须/欠",present:{je:"dois",tu:"dois",il:"doit",nous:"devons",vous:"devez",ils:"doivent"},past:"dû"},
  dire:{inf:"dire",zh:"说",present:{je:"dis",tu:"dis",il:"dit",nous:"disons",vous:"dites",ils:"disent"},past:"dit"}
};
const REGULAR_IR=new Set(["finir","choisir","réussir","reussir","remplir","réfléchir","reflechir","grandir","grossir","maigrir","obéir","obeir","punir"]);
const REGULAR_RE=new Set(["vendre","attendre","répondre","repondre","perdre","descendre","rendre","entendre"]);
const REGULAR_ER=new Set(["parler","aimer","chercher","trouver","regarder","donner","demander","travailler","jouer","écouter","ecouter","habiter","arriver","rester","passer","porter","fermer","montrer","entrer","tomber"]);
const RULES=[
  ["名词性数","阳性常见 <code>le/un</code>，阴性常见 <code>la/une</code>。复数通常加 <code>-s</code>，<code>-eau/-eu</code> 多加 <code>-x</code>，<code>-al</code> 常变 <code>-aux</code>。"],
  ["形容词配合","阴性通常加 <code>-e</code>，复数加 <code>-s</code>。若本来以 <code>-e</code> 结尾，阴性不再加；<code>-eux</code> 常变 <code>-euse</code>。"],
  ["-er 现在时","去掉 <code>-er</code>：<code>e, es, e, ons, ez, ent</code>。例：parler -> parle/parles/parle/parlons/parlez/parlent。"],
  ["-ir 现在时","规则二组：去掉 <code>-ir</code>：<code>is, is, it, issons, issez, issent</code>。例：finir。"],
  ["-re 现在时","去掉 <code>-re</code>：<code>s, s, -, ons, ez, ent</code>。例：vendre -> vends/vends/vend/vendons/vendez/vendent。"],
  ["过去分词","规则：<code>-er -> -é</code>，<code>-ir -> -i</code>，<code>-re -> -u</code>。高频不规则要单独记：été, eu, fait, pris, vu, dit。"],
  ["复合过去性数","用 être 的动词过去分词要配合主语：<code>allé/allée/allés/allées</code>；用 avoir 通常不配合。"]
];
const POS_CHOICES=["Noun","Verb","Adjective","Adverb","Preposition","Pronoun","Other"];
const GENDER_CHOICES=["Masculine","Feminine","Unknown"];
const NUMBER_CHOICES=["Singular","Plural"];
const TENSE_CHOICES=["Présent","Participe passé","Infinitif"];
const PERSON_CHOICES=["je","tu","il/elle","nous","vous","ils/elles","none"];
let DATA={entries:[]},mode="identify",current=null,answered=false,feedback="";
let stats=JSON.parse(localStorage.getItem("tcf-morphology-two-mode-v1")||"{}");
const $=s=>document.querySelector(s);
const norm=x=>(x||"").toString().trim().toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"").replace(/[’']/g,"'");
const clean=x=>(x||"").toString().trim();
const todayKey=()=>new Date().toISOString().slice(0,10);
const saveStats=()=>localStorage.setItem("tcf-morphology-two-mode-v1",JSON.stringify(stats));
const entryStats=id=>stats[id]||(stats[id]={correct:0,wrong:0,streak:0,last:null});
const sample=arr=>arr[Math.floor(Math.random()*arr.length)];
function weightedPick(items){
  if(!items.length)return null;
  const weights=items.map(x=>1+Math.max(0,entryStats(x.id).wrong-2)*3);
  let roll=Math.random()*weights.reduce((a,b)=>a+b,0);
  for(let i=0;i<items.length;i++){roll-=weights[i];if(roll<=0)return items[i]}
  return items[items.length-1];
}
function inferPos(e){
  const raw=norm(e.partOfSpeech||e.notes);
  if(raw.includes("noun")||raw.includes(" n."))return "Noun";
  if(raw.includes("verb")||raw.includes(" v.")||raw.startsWith("v."))return "Verb";
  if(raw.includes("adj"))return "Adjective";
  if(raw.includes("adv"))return "Adverb";
  if(raw.includes("prep"))return "Preposition";
  if(raw.includes("pro"))return "Pronoun";
  return "Other";
}
function nounNumber(e){
  if(e.plural&&norm(e.french)===norm(e.plural))return "Plural";
  if((e.notes||"").toLowerCase().includes(" plural "))return "Plural";
  return "Singular";
}
function regularPlural(word){
  if(/(s|x|z)$/i.test(word))return word;
  if(/eau$/i.test(word)||/eu$/i.test(word))return word+"x";
  if(/al$/i.test(word))return word.slice(0,-2)+"aux";
  return word+"s";
}
function adjectiveForms(base){
  let f=base.endsWith("e")?base:base+"e";
  if(/eux$/i.test(base))f=base.replace(/eux$/i,"euse");
  const mp=base.endsWith("s")||base.endsWith("x")?base:base+"s";
  const fp=f.endsWith("s")||f.endsWith("x")?f:f+"s";
  return {ms:base,fs:f,mp,fp};
}
function regularVerb(inf){
  const v=norm(inf);
  if(IRREGULAR[v])return IRREGULAR[v];
  if(v.endsWith("er")){
    if(!REGULAR_ER.has(v))return null;
    const stem=inf.slice(0,-2);
    return {inf,zh:"",present:{je:stem+"e",tu:stem+"es",il:stem+"e",nous:stem+"ons",vous:stem+"ez",ils:stem+"ent"},past:stem+"é",rule:"-er"};
  }
  if(v.endsWith("ir")){
    if(!REGULAR_IR.has(v))return null;
    const stem=inf.slice(0,-2);
    return {inf,zh:"",present:{je:stem+"is",tu:stem+"is",il:stem+"it",nous:stem+"issons",vous:stem+"issez",ils:stem+"issent"},past:stem+"i",rule:"-ir"};
  }
  if(v.endsWith("re")){
    if(!REGULAR_RE.has(v))return null;
    const stem=inf.slice(0,-2);
    return {inf,zh:"",present:{je:stem+"s",tu:stem+"s",il:stem,nous:stem+"ons",vous:stem+"ez",ils:stem+"ent"},past:stem+"u",rule:"-re"};
  }
  return null;
}
function verbPool(){
  const fromAnki=DATA.entries.filter(e=>inferPos(e)==="Verb"&&regularVerb(e.lemma||e.french)).map(e=>({id:e.id,inf:e.lemma||e.french,zh:e.chinese||"",source:"Anki"}));
  const built=Object.values(IRREGULAR).map(v=>({id:"irregular-"+v.inf,inf:v.inf,zh:v.zh,source:"不规则"}));
  const merged=new Map();
  [...fromAnki,...built].forEach(v=>merged.set(norm(v.inf),v));
  return [...merged.values()];
}
function identifyPool(){
  const items=[];
  DATA.entries.forEach(e=>{
    const pos=inferPos(e);
    if(!e.french)return;
    if(pos==="Noun"){
      items.push({id:e.id,kind:"noun",display:e.french,zh:e.chinese,answer:{gender:e.gender||"Unknown",number:nounNumber(e)},note:e.notes||""});
    }
    const verb=pos==="Verb"?regularVerb(e.lemma||e.french):null;
    if(verb){
      Object.entries(verb.present).forEach(([person,form])=>items.push({id:`${e.id}-${person}`,kind:"verb",display:form,zh:e.chinese,answer:{person:person==="il"?"il/elle":person==="ils"?"ils/elles":person,tense:"Présent"},note:e.lemma||e.french}));
      items.push({id:`${e.id}-past`,kind:"verb",display:verb.past,zh:e.chinese,answer:{person:"none",tense:"Participe passé"},note:e.lemma||e.french});
    }
  });
  return items;
}
function producePool(){
  const tasks=[];
  DATA.entries.filter(e=>inferPos(e)==="Noun"&&e.french).forEach(e=>{
    tasks.push({id:`plural-${e.id}`,kind:"noun",title:e.lemma||e.french,zh:e.chinese,fields:{plural:e.plural||regularPlural(e.lemma||e.french)}});
  });
  DATA.entries.filter(e=>inferPos(e)==="Adjective"&&e.french).forEach(e=>{
    tasks.push({id:`adj-${e.id}`,kind:"adjective",title:e.lemma||e.french,zh:e.chinese,fields:adjectiveForms(e.lemma||e.french)});
  });
  verbPool().forEach(v=>{
    const forms=regularVerb(v.inf);
    if(forms)tasks.push({id:`verb-${norm(v.inf)}`,kind:"verb",title:v.inf,zh:v.zh,fields:{...forms.present,past:forms.past},rule:forms.rule||"不规则"});
  });
  return tasks;
}
function setMode(next){
  mode=next;
  document.querySelectorAll("[data-mode]").forEach(b=>b.classList.toggle("active",b.dataset.mode===mode));
  nextQuestion();
}
function renderStats(){
  const today=Object.values(stats).filter(x=>x.last===todayKey());
  const correct=today.reduce((a,b)=>a+(b.todayCorrect||0),0);
  const wrong=today.reduce((a,b)=>a+(b.todayWrong||0),0);
  const rate=correct+wrong?Math.round(correct/(correct+wrong)*100):0;
  $("#todayStats").innerHTML=`<div class="stat"><b>${correct}</b><span>正确</span></div><div class="stat"><b>${wrong}</b><span>错误</span></div><div class="stat"><b>${rate}%</b><span>正确率</span></div>`;
}
function record(ok){
  if(answered)return;
  answered=true;
  const s=entryStats(current.id),day=todayKey();
  if(s.last!==day){s.todayCorrect=0;s.todayWrong=0;s.last=day}
  if(ok){s.correct++;s.todayCorrect++;s.streak++}else{s.wrong++;s.todayWrong++;s.streak=0}
  saveStats();renderStats();
}
function nextQuestion(){
  answered=false;feedback="";
  if(mode==="identify"){
    $("#modeTitle").textContent="识别选择";
    $("#modeHint").textContent="给一个词或动词形式，选择词性、性数、时态/人称。";
    current=weightedPick(identifyPool());
    renderIdentify();
  }else{
    $("#modeTitle").textContent="变化输出";
    $("#modeHint").textContent="给一个规则或不规则项目，写出完整变化。";
    current=weightedPick(producePool());
    renderProduce();
  }
}
function emptyHtml(){
  return `<div class="question"><div class="word" style="font-size:34px">没有可用题目</div><p class="hint">本地页面会自动读取 Anki；如果这里为空，请确认 Anki 数据库存在并刷新。</p></div>`;
}
function renderIdentify(){
  if(!current){$("#trainerBody").innerHTML=emptyHtml();return}
  const groups=current.kind==="verb"
    ? `${choiceGroup("1. 人称","person",PERSON_CHOICES)}${choiceGroup("2. 时态/形式","tense",TENSE_CHOICES)}`
    : `${choiceGroup("1. 性","gender",GENDER_CHOICES)}${choiceGroup("2. 数","number",["Singular","Plural"])}`;
  $("#trainerBody").innerHTML=`
    <div class="question"><div class="word">${current.display}</div><p class="hint">${current.zh||""}${current.note?` · ${current.note}`:""}</p></div>
    <div class="choiceBlock">${groups}</div>
    <div class="actions"><button class="primary" id="submitBtn">提交</button><button class="ghost" id="showBtn">显示答案</button></div>
    ${feedbackHtml()}
  `;
  bindChoices();
}
function choiceGroup(title,key,choices){
  return `<div class="choiceGroup"><h3>${title}</h3><div class="choices">${choices.map(x=>`<button class="choice" data-key="${key}" data-value="${x}">${x}</button>`).join("")}</div></div>`;
}
function bindChoices(){
  document.querySelectorAll(".choice").forEach(btn=>btn.onclick=()=>btn.classList.toggle("selected"));
  $("#submitBtn").onclick=checkIdentify;
  $("#showBtn").onclick=showAnswer;
}
function selectedMap(){
  const out={};
  document.querySelectorAll(".choice.selected").forEach(btn=>out[btn.dataset.key]=btn.dataset.value);
  return out;
}
function checkIdentify(){
  const got=selectedMap(), ans=current.answer;
  const keys=current.kind==="verb"?["person","tense"]:["gender","number"];
  const ok=keys.every(k=>(got[k]||"")===String(ans[k]||"none"));
  record(ok);
  document.querySelectorAll(".choice").forEach(btn=>{
    const good=String(ans[btn.dataset.key]||"none")===btn.dataset.value;
    if(good)btn.classList.add("good");
    else if(btn.classList.contains("selected"))btn.classList.add("bad");
  });
  feedback=(ok?"正确。":"不对。")+answerLine(ans);
  $("#trainerBody").insertAdjacentHTML("beforeend",feedbackHtml());
  if(ok)setTimeout(nextQuestion,650);
}
function renderProduce(){
  if(!current){$("#trainerBody").innerHTML=emptyHtml();return}
  const labels={plural:"复数",ms:"阳性单数",fs:"阴性单数",mp:"阳性复数",fp:"阴性复数",je:"je",tu:"tu",il:"il/elle",nous:"nous",vous:"vous",ils:"ils/elles",past:"过去分词"};
  const fields=Object.keys(current.fields);
  $("#trainerBody").innerHTML=`
    <div class="question">
      <div class="word">${current.title}</div>
      <p class="hint">${current.zh||""} · ${current.kind}${current.rule?` · ${current.rule}`:""}</p>
      <div class="chips"><span class="chip">${current.kind==="verb"?"写现在时六个人称 + 过去分词":current.kind==="adjective"?"写四种性数变化":"写复数"}</span></div>
    </div>
    <div class="form"><div class="formGrid">${fields.map(k=>`<label>${labels[k]||k}<input data-field="${k}" autocomplete="off"></label>`).join("")}</div></div>
    <div class="actions"><button class="primary" id="submitBtn">提交</button><button class="ghost" id="showBtn">显示答案</button></div>
    ${feedbackHtml()}
  `;
  $("#submitBtn").onclick=checkProduce;
  $("#showBtn").onclick=showAnswer;
  document.querySelectorAll("[data-field]").forEach(i=>i.onkeydown=e=>{if(e.key==="Enter")checkProduce()});
}
function checkProduce(){
  const got={};
  document.querySelectorAll("[data-field]").forEach(i=>got[i.dataset.field]=i.value);
  const ok=Object.entries(current.fields).every(([k,v])=>norm(got[k])===norm(v));
  record(ok);
  document.querySelectorAll("[data-field]").forEach(i=>{
    const good=norm(i.value)===norm(current.fields[i.dataset.field]);
    i.style.borderColor=good?"var(--green)":"var(--red)";
  });
  feedback=(ok?"正确。":"不对。")+answerLine(current.fields);
  $("#trainerBody").insertAdjacentHTML("beforeend",feedbackHtml());
  if(ok)setTimeout(nextQuestion,650);
}
function answerLine(obj){return " 答案：" + Object.entries(obj).map(([k,v])=>`${k}: ${v}`).join("；")}
function feedbackHtml(){return feedback?`<div class="feedback ${feedback.startsWith("正确")?"ok":"no"}">${feedback}</div>`:""}
function showAnswer(){
  feedback="答案："+answerLine(mode==="identify"?current.answer:current.fields);
  mode==="identify"?renderIdentify():renderProduce();
}
function renderRules(){
  $("#rules").innerHTML=RULES.map(([title,text])=>`<div class="rule"><b>${title}</b><p class="small">${text}</p></div>`).join("");
}
function entryHtml(e){
  return `<div class="entry"><b>${e.french||e.lemma}</b><span>${e.chinese||""}</span><span>${inferPos(e)} · ${e.gender||"Unknown"} · ${e.theme||""}</span></div>`;
}
function search(){
  const q=norm($("#searchInput").value);
  if(!q){$("#searchResults").innerHTML="";return}
  const result=DATA.entries.filter(e=>[e.french,e.lemma,e.chinese,e.theme,e.notes].some(x=>norm(x).includes(q))).slice(0,30);
  $("#searchResults").innerHTML=result.map(entryHtml).join("")||`<p class="small">没有找到。</p>`;
}
async function loadMorphologyData(){
  if(!location.hostname.endsWith("github.io")){
    try{
      const live=await fetch(`/api/morphology-data?t=${Date.now()}`);
      if(live.ok)return await live.json();
    }catch(_){}
  }
  return fetch(`data/morphology.json?t=${Date.now()}`).then(r=>r.json());
}
document.querySelectorAll("[data-mode]").forEach(btn=>btn.onclick=()=>setMode(btn.dataset.mode));
$("#nextBtn").onclick=nextQuestion;
$("#searchInput").oninput=search;
renderRules();renderStats();
loadMorphologyData().then(data=>{
  DATA=data;
  $("#dataSource").textContent=`已载入 ${DATA.entries.length.toLocaleString("zh-CN")} 条 Anki 词条。`;
  nextQuestion();
}).catch(err=>{
  $("#trainerBody").innerHTML=`<div class="question"><div class="word" style="font-size:34px">读取 Anki 数据失败</div><p class="hint">${err.message}</p></div>`;
});
</script>
</body>
</html>
