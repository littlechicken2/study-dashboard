<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#07120f">
  <title>学习监督台</title>
  <style>
    :root{--bg:#07120f;--panel:#10211b;--line:#294238;--text:#f3f7f5;--muted:#a8b8b0;--green:#69e39d;--cyan:#62d9de;--red:#ff5b64;--blue:#6797ff}
    *{box-sizing:border-box}
    body{margin:0;color:var(--text);background:radial-gradient(circle at 8% -18%,rgba(105,227,157,.16),transparent 28rem),radial-gradient(circle at 100% 0,rgba(98,217,222,.12),transparent 28rem),var(--bg);font-family:Inter,"Segoe UI","Microsoft YaHei",sans-serif;overflow:hidden}
    main{width:min(1240px,calc(100% - 24px));height:100vh;margin:auto;padding:14px 0;display:grid;grid-template-rows:auto 1fr;gap:10px}
    header,.top,.cardHead,.miniTop{display:flex;align-items:center;justify-content:space-between;gap:12px}
    h1,h2,p{margin:0}
    h1{font-size:24px;line-height:1}
    h2{font-size:15px}
    a{color:var(--cyan)}
    .muted{color:var(--muted)}
    .date{text-align:right;font-size:12px;font-variant-numeric:tabular-nums}
    .layout{min-height:0;display:grid;grid-template-columns:1.05fr 1.35fr;gap:10px}
    .left{min-height:0;display:grid;grid-template-rows:auto auto 1fr;gap:10px}
    .card{min-width:0;min-height:0;padding:12px;border:1px solid var(--line);border-radius:7px;background:rgba(16,33,27,.94)}
    .hero{display:grid;grid-template-columns:auto 1fr;gap:18px;align-items:center}
    .heroValue{font-size:54px;font-weight:850;line-height:.9;color:var(--green);font-variant-numeric:tabular-nums}
    .bar{height:7px;overflow:hidden;border-radius:2px;background:#06100c}
    .bar i{display:block;width:var(--value);height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width .45s ease}
    .tasks{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:10px}
    .mini{min-width:0;padding:11px;border:1px solid #223d34;border-radius:6px;background:rgba(3,15,11,.45)}
    .mini b{display:block;margin:10px 0 8px;font-size:23px;font-variant-numeric:tabular-nums}
    .mini span,.detail{color:var(--muted);font-size:12px;line-height:1.45}
    .two{display:grid;grid-template-columns:1fr 1fr;gap:10px}
    .big{margin:8px 0 8px;font-size:30px;font-weight:850;font-variant-numeric:tabular-nums}
    .unit{font-size:13px;font-weight:500;color:var(--muted)}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:9px}
    .stat{padding-top:7px;border-top:1px solid var(--line)}
    .stat b{display:block;font-size:16px;font-variant-numeric:tabular-nums}
    .stat span{font-size:11px;color:var(--muted)}
    .courseRows{display:grid;gap:7px;margin-top:9px}
    .courseRow{display:grid;grid-template-columns:40px 1fr 54px;gap:8px;align-items:center;font-size:12px}
    .courseRow span{text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}
    .tracker{display:grid;grid-template-rows:auto 1fr;gap:8px;overflow:hidden}
    .legend{display:flex;gap:12px;flex-wrap:wrap;color:var(--muted);font-size:12px}
    .legend i{display:inline-block;width:9px;height:9px;margin-right:4px;border-radius:2px}
    .calendarWrap{min-height:0;overflow:hidden}
    .monthName{margin:2px 0 8px;color:var(--text);font-size:16px;font-weight:750}
    .calendarGrid{display:grid;grid-template-columns:repeat(7,minmax(0,1fr));gap:5px}
    .weekday{color:var(--muted);font-size:11px;text-align:center}
    .rgbDay{aspect-ratio:1/1;min-height:0;display:grid;grid-template-columns:1fr 1fr;grid-template-rows:1fr 1fr;gap:2px;padding:3px;border:1px solid #253e35;border-radius:5px;background:#081510}
    .rgbDay.empty{opacity:.28}
    .rgbDay b{display:grid;place-items:center;background:#0e211a;color:#d7e4de;font-size:11px;font-weight:800;font-variant-numeric:tabular-nums}
    .rgbDay span{border-radius:2px}
    .rgbDay .r{background:rgb(var(--r),0,0)}
    .rgbDay .g{background:rgb(0,var(--g),0)}
    .rgbDay .b{background:rgb(0,0,var(--b))}
    footer{display:none}
    @media(max-width:900px){body{overflow:auto}main{height:auto;padding:18px 0}.layout,.left,.two,.tasks{grid-template-columns:1fr;display:grid}.left{grid-template-rows:auto}.hero{grid-template-columns:1fr}.tracker{min-height:520px}.calendarGrid{gap:4px}.rgbDay b{font-size:10px}}
  </style>
</head>
<body>
<main>
  <header>
    <div><h1>学习监督台</h1><p class="muted">Reading / Grammar / Verb 每天留下真实进度。</p></div>
    <p class="date muted" id="updated">读取中</p>
  </header>
  <section class="layout" id="dashboard"></section>
</main>
<script>
const n=(v,d=0)=>Number(v||0).toLocaleString("zh-CN",{maximumFractionDigits:d,minimumFractionDigits:d});
const pct=v=>`${n(v,2)}%`;
const bar=v=>`<div class="bar"><i style="--value:${Math.max(0,Math.min(100,v||0))}%"></i></div>`;
const stats=items=>`<div class="stats">${items.map(([v,k])=>`<div class="stat"><b>${v}</b><span>${k}</span></div>`).join("")}</div>`;
const level=(value,target)=>Math.max(0,Math.min(255,Math.round((Number(value||0)/Math.max(1,target))*255)));
const eta=x=>x?.etaDate?`${x.etaDate} (${n(x.etaDays)} 天)`:"暂无速度";
const monthLabel=d=>`${d.getFullYear()} 年 ${d.getMonth()+1} 月`;
const calendar=(a,r,c,act)=>{
  const map=rows=>new Map((rows||[]).map(x=>[x.date,x])),am=map(a),rm=map(r),cm=map(c),tm=map(act);
  const now=new Date(),year=now.getFullYear(),month=now.getMonth(),days=new Date(year,month+1,0).getDate();
  const first=(new Date(year,month,1).getDay()+6)%7;
  const readingDailyTarget=780/days;
  const weekdays=["一","二","三","四","五","六","日"];
  const cells=weekdays.map(x=>`<div class="weekday">${x}</div>`);
  for(let i=0;i<first;i++) cells.push(`<span class="rgbDay empty"></span>`);
  for(let i=1;i<=days;i++){
    const key=`${year}-${String(month+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;
    const rr=rm.get(key)||{}, aa=am.get(key)||{}, cc=cm.get(key)||{}, tt=tm.get(key)||{};
    const red=Math.max(level(rr.questions,readingDailyTarget),level(tt.readingMinutes,30));
    const green=Math.max(level(cc.minutes,30),level(tt.grammarMinutes,30));
    const blue=Math.max(level((aa.reviews||0)+(aa.new||0),20),level(tt.verbMinutes,20));
    cells.push(`<span class="rgbDay" style="--r:${red};--g:${green};--b:${blue}" title="${key} | Reading ${rr.questions||0} 题 / ${n(tt.readingMinutes||0,1)} 分钟 | Grammar ${n(cc.minutes||0,1)} 分钟 / ${n(tt.grammarMinutes||0,1)} 有效分钟 | Verb ${Number(aa.reviews||0)+Number(aa.new||0)} 次 / ${n(tt.verbMinutes||0,1)} 分钟"><span class="r"></span><span class="g"></span><span class="b"></span><b>${i}</b></span>`);
  }
  return `<div class="monthName">${monthLabel(now)}</div><div class="calendarGrid">${cells.join("")}</div>`;
};
async function load(){
  const data=await fetch(`data/progress.json?t=${Date.now()}`).then(r=>r.json());
  const a=data.anki,c=data.course,r=data.reading,act=data.activity||{today:{readingMinutes:0,grammarMinutes:0,verbMinutes:0,totalMinutes:0,warnings:[]},history:[]};
  const pdf=c.pdf||{pages:0,totalPages:88,percent:0,todayPages:0,month:{recommendedToday:0,remaining:88,daysRemaining:0}};
  const pdfMonth=pdf.month||{};
  const readDone=(r.today.activityComplete||act.today.readingMinutes>0)?100:0;
  const verbDone=(a.today.activityComplete||act.today.verbMinutes>0)?100:0;
  const grammarDone=(c.today.activityComplete||act.today.grammarMinutes>0)?100:0;
  const daily=(readDone+verbDone+grammarDone)/3;
  document.querySelector("#updated").textContent=`更新于 ${new Date(data.updatedAt).toLocaleString("zh-CN")}`;
  document.querySelector("#dashboard").innerHTML=`
  <section class="left">
    <article class="card hero"><div class="heroValue">${pct(daily)}</div><div><div class="cardHead"><h2>今日完成度</h2><span class="muted">${n(data.today.focusMinutes)} 分钟</span></div>${bar(daily)}<p class="detail">Reading ${pct(readDone)} · Grammar ${pct(grammarDone)} · Verb ${pct(verbDone)} · 警告 ${n((act.today.warnings||[]).length)} 次</p></div></article>
    <section class="tasks">
      <article class="mini"><div class="miniTop"><h2>Reading</h2><span>月底 20 Test</span></div><b>${n(r.today.questions)} / ${n(r.month.recommendedToday)}</b>${bar(r.today.goalPercent)}<p class="detail">本月 ${n(r.month.completed)} / ${n(r.month.target)} 题 · ETA ${eta({etaDate:r.month.etaDate,etaDays:r.month.etaDays})}</p></article>
      <article class="mini"><div class="miniTop"><h2>Grammar</h2><span>视频/PDF</span></div><b>${n(c.today.minutes,1)} 分钟</b>${bar(grammarDone)}<p class="detail">PDF 今日 ${n(pdf.todayPages)} / ${n(pdfMonth.recommendedToday)} 页 · 视频 ${n(c.today.videoMinutes,1)} 分钟</p></article>
      <article class="mini"><div class="miniTop"><h2>Verb</h2><span>Anki</span></div><b>${n(a.today.reviews)} / ${n(a.today.new)}</b>${bar(verbDone)}<p class="detail">复习 / 新卡 · ${n(a.today.minutes,1)} 分钟 · 连续 ${n(a.streak)} 天</p></article>
    </section>
    <section class="two">
      <article class="card"><div class="cardHead"><h2>A1 讲义</h2><span class="muted">${pct(pdf.percent)}</span></div><div class="big">${n(pdf.pages)} / ${n(pdf.totalPages)} <span class="unit">页</span></div>${bar(pdf.percent)}${stats([[`${n(pdf.todayPages)} / ${n(pdfMonth.recommendedToday)}`,"今日 / 建议"],[n(pdfMonth.remaining),"剩余页"],[eta(pdfMonth),"ETA"]])}<p class="detail"><a href="http://10.0.0.19:8765/pdf_reader.html">打开 PDF 阅读器</a></p></article>
      <article class="card"><div class="cardHead"><h2>课程累计</h2><span class="muted">${pct(c.total.percent)}</span></div><div class="courseRows">${c.courses.map(x=>`<div class="courseRow"><strong>${x.label}</strong>${bar(x.percent)}<span>${pct(x.percent)}</span></div>`).join("")}</div></article>
    </section>
  </section>
  <article class="card tracker"><div class="cardHead"><h2>RGB Tracker</h2><div class="legend"><span><i style="background:#f00"></i>Reading</span><span><i style="background:#0f0"></i>Grammar</span><span><i style="background:#00f"></i>Verb</span></div></div><div class="calendarWrap">${calendar(a.history,r.history,c.history,act.history||[])}</div></article>`;
}
load().catch(e=>document.querySelector("#dashboard").innerHTML=`<article class="card"><h2>暂时没有进度数据</h2><p class="muted">${e.message}</p></article>`);
</script>
</body>
</html>
