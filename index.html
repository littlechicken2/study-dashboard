<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#07120f">
  <title>学习监督台</title>
  <style>
    :root{--bg:#07120f;--panel:#10211b;--line:#294238;--text:#f3f7f5;--muted:#a8b8b0;--green:#69e39d;--cyan:#62d9de}
    *{box-sizing:border-box}
    body{margin:0;color:var(--text);background:radial-gradient(circle at 10% -10%,rgba(105,227,157,.17),transparent 36rem),radial-gradient(circle at 100% 0,rgba(98,217,222,.12),transparent 30rem),var(--bg);font-family:Inter,"Segoe UI","Microsoft YaHei",sans-serif}
    main{width:1040px;max-width:calc(100% - 20px);margin:auto;padding:8px 0 0;zoom:var(--ui-scale,1)}
    header,.sectionHead,.goalTop{display:flex;justify-content:space-between;gap:16px;align-items:flex-end}
    header{margin-bottom:0}
    h1{margin:0 0 3px;font-size:26px;line-height:1}
    h2{margin:0;font-size:16px}
    p{margin:0}
    a{color:var(--cyan)}
    .muted{color:var(--muted)}
    .date{text-align:right;font-variant-numeric:tabular-nums}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-top:6px;align-items:stretch}
    .card{min-width:0;padding:14px;border:1px solid var(--line);border-radius:7px;background:rgba(16,33,27,.94);overflow:hidden}
    .card:not(.hero):not(.trackerCard):not(.courseCard){display:flex;flex-direction:column}
    .hero{grid-column:1/-1;display:grid;grid-template-columns:270px 1fr;grid-template-rows:auto 1fr;gap:8px 14px}
    .hero>.sectionHead{grid-column:1/-1}
    .wide{grid-column:auto}
    .overview{display:grid;grid-template-columns:1fr;gap:8px;align-items:center;margin:0}
    .heroValue{font-size:64px;font-weight:800;line-height:.9;color:var(--green);font-variant-numeric:tabular-nums}
    .goalGrid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
    .goal{padding:12px;border:1px solid var(--line);border-radius:5px;background:rgba(3,15,11,.45)}
    .goalTop{align-items:baseline}
    .goalTop span{font-size:12px;color:var(--muted)}
    .goalValue,.big{margin-top:8px;font-size:27px;font-weight:800;font-variant-numeric:tabular-nums}
    .unit{font-size:12px;font-weight:500;color:var(--muted)}
    .bar{height:8px;margin:9px 0;overflow:hidden;border-radius:2px;background:#06100c}
    .bar i{display:block;width:var(--value);height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width .5s ease}
    .details{margin-top:6px;color:var(--muted);font-size:11px;line-height:1.4}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:auto;padding-top:10px}
    .stat{padding-top:6px;border-top:1px solid var(--line)}
    .stat b{display:block;font-size:18px;font-variant-numeric:tabular-nums}
    .stat span{font-size:11px;color:var(--muted)}
    .courseCard{display:flex;flex-direction:column}
    .courseCard{grid-column:span 2}
    .courseRows{flex:1;display:grid;align-content:space-evenly;gap:6px;margin-top:6px}
    .courseRow{display:grid;grid-template-columns:42px 1fr 56px;gap:7px;align-items:center;font-size:12px}
    .courseRow span{text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}
    .trackerCard{padding:10px}
    .legend{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:11px}
    .legend i{display:inline-block;width:9px;height:9px;margin-right:4px;border-radius:2px}
    .trackerCard .sectionHead{align-items:center}
    .trackerCard .legend{gap:6px;flex-wrap:nowrap;font-size:10px}
    .trackerCard .legend i{width:7px;height:7px;margin-right:2px}
    .monthLabel{display:none}
    .rgbCalendar{display:grid;grid-template-columns:repeat(7,20px);grid-auto-rows:20px;justify-content:center;gap:3px;padding:5px 0 0}
    .weekday{display:grid;place-items:center;color:var(--muted);font-size:10px}
    .rgbDay.empty{opacity:.18}
    .rgbDay.future{opacity:.3}
    .rgbDay{position:relative;display:grid;grid-template-columns:repeat(2,minmax(0,1fr));grid-template-rows:1fr;gap:1px;padding:2px;border:1px solid #253e35;border-radius:4px;background:#081510;overflow:hidden}
    .rgbDay b{position:absolute;inset:0;z-index:2;display:grid;place-items:center;min-width:0;background:transparent;color:#fff;font-size:9px;font-weight:800;font-variant-numeric:tabular-nums;text-shadow:0 1px 2px #000,0 0 3px #000;pointer-events:none}
    .rgbDay span{min-width:0;border-radius:1px}
    .rgbDay .r{background:rgb(var(--r),0,0)}
    .rgbDay .b{background:rgb(0,0,var(--b))}
    .actions{display:flex;gap:7px;margin-top:9px}
    .action{min-height:34px;padding:0 12px;border:0;border-radius:4px;background:#18392d;color:var(--text);font:inherit;font-weight:700;cursor:pointer}
    .action.primary{flex:1;background:linear-gradient(90deg,var(--green),var(--cyan));color:#03120d}
    .action:disabled{opacity:.55;cursor:wait}
    .recordStatus{min-height:16px;margin-top:5px;color:var(--muted);font-size:11px}
    .pill{display:inline-flex;align-items:center;justify-content:center;min-height:28px;margin-bottom:5px;padding:0 10px;border-radius:4px;background:linear-gradient(90deg,var(--green),var(--cyan));color:#03120d;text-decoration:none;font-weight:800}
    .pinnedPlan{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:center;margin:6px 0;padding:10px 12px;border:1px solid rgba(105,227,157,.38);border-radius:7px;background:linear-gradient(90deg,rgba(105,227,157,.16),rgba(98,217,222,.10))}
    .pinnedPlan b{display:block;font-size:16px}
    .pinnedPlan span{color:var(--muted);font-size:12px;line-height:1.35}
    .planDays{font-size:24px;font-weight:900;color:var(--green);font-variant-numeric:tabular-nums;text-align:right}
    footer{display:none}
    @media(max-width:760px){main{padding:18px 0}.grid{grid-template-columns:1fr}.hero{display:block}.hero,.trackerCard,.wide{grid-column:auto}.goalGrid,.overview{grid-template-columns:1fr}.goalGrid{margin-top:10px}.date{font-size:11px}.pinnedPlan{grid-template-columns:1fr}.planDays{text-align:left}}
  </style>
</head>
<body>
<main>
  <header>
    <div><h1>学习监督台</h1><p class="muted">月底目标明确，每天只要求留下真实进度。</p></div>
    <p class="date muted"><a class="pill" href="morphology.html">背单词训练</a><br><span id="updated">读取中</span></p>
  </header>
  <section class="pinnedPlan">
    <div><b>置顶目标：2026 年 9 月前考完法语</b><span>每日主线：Lingua 阅读 3 篇 · Anki 新卡 50 张 · 词形训练 10 分钟。先保证有记录，再追求多做。</span></div>
    <div class="planDays" id="examCountdown">-- 天</div>
  </section>
  <section class="grid" id="dashboard"></section>
  <footer>公开页面只展示统计数字，不包含卡片、题目、PDF 内容或本地文件。</footer>
</main>
<script>
const n=(v,d=0)=>Number(v||0).toLocaleString("zh-CN",{maximumFractionDigits:d,minimumFractionDigits:d});
const pct=v=>`${n(v,2)}%`;
const bar=v=>`<div class="bar"><i style="--value:${Math.max(0,Math.min(100,v||0))}%"></i></div>`;
const stats=items=>`<div class="stats">${items.map(([v,k])=>`<div class="stat"><b>${v}</b><span>${k}</span></div>`).join("")}</div>`;
let currentReadingArticles=0;
let recordNotice="";
const localDateKey=()=>{
  const d=new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
};
const storedReading=()=>{
  const value=localStorage.getItem(`lingua-reading-${localDateKey()}`);
  return value===null?null:Math.max(0,Number(value)||0);
};
const fitDashboard=()=>{
  const widthFit=(window.innerWidth-24)/1040;
  const heightFit=(window.innerHeight-24)/720;
  const scale=Math.max(1,Math.min(2,widthFit,heightFit));
  document.documentElement.style.setProperty("--ui-scale",scale.toFixed(3));
};
fitDashboard();
addEventListener("resize",fitDashboard);
const updateExamCountdown=()=>{
  const today=new Date();
  const target=new Date(2026,7,31);
  const left=Math.max(0,Math.ceil((target-today)/86400000));
  document.querySelector("#examCountdown").textContent=`${left} 天`;
};
updateExamCountdown();
const level=(value,target)=>Number(value||0)<=0?56:Math.max(72,Math.min(255,Math.round((Number(value||0)/Math.max(1,target))*255)));
const rgbTracker=(a,r,act)=>{
  const map=rows=>new Map((rows||[]).map(x=>[x.date,x])),am=map(a),rm=map(r),tm=map(act);
  const now=new Date(),year=now.getFullYear(),month=now.getMonth(),days=new Date(year,month+1,0).getDate();
  const firstDay=(new Date(year,month,1).getDay()+6)%7;
  const cells=[...['一','二','三','四','五','六','日'].map(x=>`<span class="weekday">${x}</span>`)];
  for(let i=0;i<firstDay;i++) cells.push('<span class="rgbDay empty"></span>');
  for(let i=1;i<=days;i++){
    const key=`${year}-${String(month+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;
    const rr=rm.get(key)||{}, aa=am.get(key)||{}, tt=tm.get(key)||{};
    const red=Math.max(level(rr.articles,3),level(tt.readingMinutes,30));
    const blue=Math.max(level((aa.reviews||0)+(aa.new||0),20),level(tt.verbMinutes,20));
    cells.push(`<span class="rgbDay ${i>now.getDate()?'future':''}" style="--r:${red};--b:${blue}" title="${key} | Reading ${rr.articles||0} 篇 / ${n(tt.readingMinutes||0,1)} 分钟 | Verb ${Number(aa.reviews||0)+Number(aa.new||0)} 次 / ${n(tt.verbMinutes||0,1)} 分钟"><span class="r"></span><span class="b"></span><b>${i}</b></span>`);
  }
  return `<div class="monthLabel">${year} 年 ${month+1} 月</div><div class="rgbCalendar">${cells.join("")}</div>`;
};
async function load(){
  const data=await fetch(`data/progress.json?t=${Date.now()}`).then(r=>r.json());
  const liveAnki=await loadAnkiLive();
  const a=liveAnki?.anki||data.anki,r=data.reading,act=data.activity||{today:{readingMinutes:0,verbMinutes:0,warnings:[]},history:[]};
  const addedToday=Number(liveAnki?.additionsToday?.added||0);
  const readingTarget=3;
  const browserReading=storedReading();
  currentReadingArticles=browserReading===null?Number(r.today.articles||0):browserReading;
  const readingDone=Math.min(100,currentReadingArticles/readingTarget*100);
  const verbTarget=50;
  const verbDone=Math.min(100,Number(a.today.new||0)/verbTarget*100);
  const daily=(readingDone+verbDone)/2;
  const activeMinutes=Number(act.today.readingMinutes||0)+Number(act.today.verbMinutes||0);
  document.querySelector("#updated").textContent=`更新于 ${new Date(liveAnki?.updatedAt||data.updatedAt).toLocaleString("zh-CN")}`;
  document.querySelector("#dashboard").innerHTML=`
  <article class="card hero">
    <div class="sectionHead"><h2>今日活动完成度</h2><span class="muted">${n(activeMinutes,1)} 分钟已记录</span></div>
    <div class="overview"><div class="heroValue">${pct(daily)}</div><div><p class="muted">Reading 与 Verb 均达标才是 100%</p>${bar(daily)}<p class="details">Reading ${pct(readingDone)} · Verb ${pct(verbDone)}<br>有效时长：Reading ${n(act.today.readingMinutes,1)} 分钟 · Verb ${n(act.today.verbMinutes,1)} 分钟 · 警告 ${n((act.today.warnings||[]).length)} 次</p></div></div>
    <div class="goalGrid">
      <div class="goal"><div class="goalTop"><h2>Reading</h2><span>Lingua A1 · 每日 3 篇</span></div><div class="goalValue">${n(currentReadingArticles)} / ${n(readingTarget)} <span class="unit">篇</span></div>${bar(readingDone)}<div class="actions"><button class="action" data-reading="-1">撤销</button><a class="action primary" href="https://lingua.com/french/reading/" target="_blank" rel="noopener">打开 Lingua A1</a><button class="action" data-reading="1">+1</button></div><p class="recordStatus" id="recordStatus">${recordNotice||"完成一篇及理解题后手动 +1"}</p></div>
      <div class="goal"><div class="goalTop"><h2>Verb</h2><span>每日目标 50 张新卡</span></div><div class="goalValue">${n(a.today.new)} / ${n(verbTarget)} <span class="unit">新卡</span></div>${bar(verbDone)}<p class="details">复习 ${n(a.today.reviews)} 次 · 今日 ${n(a.today.minutes,1)} 分钟 · 连续 ${n(a.streak)} 天</p></div>
    </div>
  </article>
  <article class="card trackerCard"><div class="sectionHead"><h2>${new Date().getMonth()+1}月学习日历</h2><div class="legend"><span><i style="background:#f00"></i>阅读</span><span><i style="background:#00f"></i>动词</span></div></div>${rgbTracker(a.history,r.history,act.history||[])}</article>
  <article class="card"><div class="sectionHead"><h2>有效学习时长</h2><span class="muted">娱乐网站自动暂停</span></div><div class="big">${n(activeMinutes,1)} <span class="unit">分钟</span></div>${stats([[n(act.today.readingMinutes,1),"Reading"],[n(act.today.verbMinutes,1),"Verb"],[n((act.today.warnings||[]).length),"警告"]])}</article>
  <article class="card"><div class="sectionHead"><h2>Anki 总进度</h2><span class="muted">${pct(a.total?.percent||0)}</span></div><div class="big">${n(a.total?.learned)} / ${n(a.total?.cards)} <span class="unit">张</span></div>${bar(a.total?.percent||0)}<p class="details">今日新卡 ${n(a.today.new)} · 今日复习 ${n(a.today.reviews)} · 网站新增 ${n(addedToday)}</p><div class="actions"><button class="action" data-anki-add="-1">撤销</button><button class="action primary" data-anki-add="1">网站新增 +1</button></div>${stats([[n(a.total?.newRemaining),"未学"],[n(a.total?.mature),"成熟"],[n(a.today.minutes,1),"分钟"]])}</article>
  `;
  document.querySelectorAll("[data-reading]").forEach(button=>button.addEventListener("click",()=>recordReading(Number(button.dataset.reading))));
  document.querySelectorAll("[data-anki-add]").forEach(button=>button.addEventListener("click",()=>recordAnkiAddition(Number(button.dataset.ankiAdd))));
}
async function loadAnkiLive(){
  if(location.hostname.endsWith("github.io")) return null;
  try{
    const response=await fetch(`/api/anki-stats?t=${Date.now()}`);
    return response.ok?await response.json():null;
  }catch(_){
    return null;
  }
}
async function recordAnkiAddition(delta){
  if(location.hostname.endsWith("github.io")) return;
  await fetch("/api/anki-addition",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({delta,source:"dashboard",capturedAt:new Date().toISOString()})});
  await load();
}async function recordReading(delta){
  const buttons=[...document.querySelectorAll("[data-reading]")],status=document.querySelector("#recordStatus");
  buttons.forEach(x=>x.disabled=true);
  status.textContent="正在记录...";
  const saveInBrowser=async()=>{
    currentReadingArticles=Math.max(0,currentReadingArticles+delta);
    localStorage.setItem(`lingua-reading-${localDateKey()}`,String(currentReadingArticles));
    recordNotice="线上记录已保存于当前浏览器";
    await load();
  };
  if(location.hostname.endsWith("github.io")){
    await saveInBrowser();
    return;
  }
  try{
    const response=await fetch("/api/reading-manual",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({delta})});
    if(!response.ok) throw new Error("local api unavailable");
    localStorage.removeItem(`lingua-reading-${localDateKey()}`);
    recordNotice="已同步到本地监督台";
    await load();
  }catch(_){
    await saveInBrowser();
  }
}
load().catch(e=>document.querySelector("#dashboard").innerHTML=`<article class="card hero"><h2>暂时没有进度数据</h2><p class="muted">${e.message}</p></article>`);
</script>
</body>
</html>
