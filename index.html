<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#07120f">
  <title>学习监督台</title>
  <style>
    :root{--bg:#07120f;--panel:#10211b;--line:#294238;--text:#f3f7f5;--muted:#a8b8b0;--green:#69e39d;--cyan:#62d9de}
    *{box-sizing:border-box}
    body{margin:0;color:var(--text);background:radial-gradient(circle at 10% -10%,rgba(105,227,157,.17),transparent 36rem),radial-gradient(circle at 100% 0,rgba(98,217,222,.12),transparent 30rem),var(--bg);font-family:Inter,"Segoe UI","Microsoft YaHei",sans-serif}
    main{width:1040px;max-width:calc(100% - 20px);margin:auto;padding:8px 0 0;zoom:var(--ui-scale,1)}
    header,.sectionHead,.goalTop{display:flex;justify-content:space-between;gap:16px;align-items:flex-end}
    header{margin-bottom:0}
    h1{margin:0 0 3px;font-size:26px;line-height:1}
    h2{margin:0;font-size:16px}
    p{margin:0}
    a{color:var(--cyan)}
    .muted{color:var(--muted)}
    .date{text-align:right;font-variant-numeric:tabular-nums}
    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px;margin-top:6px;align-items:stretch}
    .card{min-width:0;padding:14px;border:1px solid var(--line);border-radius:7px;background:rgba(16,33,27,.94);overflow:hidden}
    .card:not(.hero):not(.trackerCard):not(.courseCard){display:flex;flex-direction:column}
    .hero{grid-column:1/-1;display:grid;grid-template-columns:270px 1fr;grid-template-rows:auto 1fr;gap:8px 14px}
    .hero>.sectionHead{grid-column:1/-1}
    .wide{grid-column:auto}
    .overview{display:grid;grid-template-columns:1fr;gap:8px;align-items:center;margin:0}
    .heroValue{font-size:64px;font-weight:800;line-height:.9;color:var(--green);font-variant-numeric:tabular-nums}
    .goalGrid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:8px}
    .goal{padding:12px;border:1px solid var(--line);border-radius:5px;background:rgba(3,15,11,.45)}
    .goalTop{align-items:baseline}
    .goalTop span{font-size:12px;color:var(--muted)}
    .goalValue,.big{margin-top:8px;font-size:27px;font-weight:800;font-variant-numeric:tabular-nums}
    .unit{font-size:12px;font-weight:500;color:var(--muted)}
    .bar{height:8px;margin:9px 0;overflow:hidden;border-radius:2px;background:#06100c}
    .bar i{display:block;width:var(--value);height:100%;background:linear-gradient(90deg,var(--green),var(--cyan));transition:width .5s ease}
    .details{margin-top:6px;color:var(--muted);font-size:11px;line-height:1.4}
    .stats{display:grid;grid-template-columns:repeat(3,1fr);gap:7px;margin-top:auto;padding-top:10px}
    .stat{padding-top:6px;border-top:1px solid var(--line)}
    .stat b{display:block;font-size:18px;font-variant-numeric:tabular-nums}
    .stat span{font-size:11px;color:var(--muted)}
    .courseCard{display:flex;flex-direction:column}
    .courseRows{flex:1;display:grid;align-content:space-evenly;gap:6px;margin-top:6px}
    .courseRow{display:grid;grid-template-columns:42px 1fr 56px;gap:7px;align-items:center;font-size:12px}
    .courseRow span{text-align:right;color:var(--muted);font-variant-numeric:tabular-nums}
    .trackerCard{padding:10px}
    .legend{display:flex;gap:10px;flex-wrap:wrap;color:var(--muted);font-size:11px}
    .legend i{display:inline-block;width:9px;height:9px;margin-right:4px;border-radius:2px}
    .trackerCard .sectionHead{align-items:center}
    .trackerCard .legend{gap:6px;flex-wrap:nowrap;font-size:10px}
    .trackerCard .legend i{width:7px;height:7px;margin-right:2px}
    .monthLabel{display:none}
    .rgbCalendar{display:grid;grid-template-columns:repeat(7,20px);grid-auto-rows:20px;justify-content:center;gap:3px;padding:5px 0 0}
    .weekday{display:grid;place-items:center;color:var(--muted);font-size:10px}
    .rgbDay.empty{opacity:.18}
    .rgbDay.future{opacity:.3}
    .rgbDay{position:relative;display:grid;grid-template-columns:repeat(3,minmax(0,1fr));grid-template-rows:1fr;gap:1px;padding:2px;border:1px solid #253e35;border-radius:4px;background:#081510;overflow:hidden}
    .rgbDay b{position:absolute;inset:0;z-index:2;display:grid;place-items:center;min-width:0;background:transparent;color:#fff;font-size:9px;font-weight:800;font-variant-numeric:tabular-nums;text-shadow:0 1px 2px #000,0 0 3px #000;pointer-events:none}
    .rgbDay span{min-width:0;border-radius:1px}
    .rgbDay .r{background:rgb(var(--r),0,0)}
    .rgbDay .g{background:rgb(0,var(--g),0)}
    .rgbDay .b{background:rgb(0,0,var(--b))}
    .courseCard .bar{margin:0}
    .pdfCard{padding:10px}
    .pdfCard .big{font-size:24px;margin-top:5px}
    .pdfCard>.bar{margin:6px 0}
    .pdfCard .stat b{font-size:16px}
    .pdfCard .details{font-size:10px;margin-top:3px}
    .readingPlan{padding:12px}
    footer{display:none}
    @media(max-width:760px){main{padding:18px 0}.grid{grid-template-columns:1fr}.hero{display:block}.hero,.trackerCard,.wide{grid-column:auto}.goalGrid,.overview{grid-template-columns:1fr}.goalGrid{margin-top:10px}.date{font-size:11px}}
  </style>
</head>
<body>
<main>
  <header>
    <div><h1>学习监督台</h1><p class="muted">月底目标明确，每天只要求留下真实进度。</p></div>
    <p class="date muted" id="updated">读取中</p>
  </header>
  <section class="grid" id="dashboard"></section>
  <footer>公开页面只展示统计数字，不包含卡片、题目、PDF 内容或本地文件。</footer>
</main>
<script>
const n=(v,d=0)=>Number(v||0).toLocaleString("zh-CN",{maximumFractionDigits:d,minimumFractionDigits:d});
const pct=v=>`${n(v,2)}%`;
const bar=v=>`<div class="bar"><i style="--value:${Math.max(0,Math.min(100,v||0))}%"></i></div>`;
const stats=items=>`<div class="stats">${items.map(([v,k])=>`<div class="stat"><b>${v}</b><span>${k}</span></div>`).join("")}</div>`;
const fitDashboard=()=>{
  const widthFit=(window.innerWidth-24)/1040;
  const heightFit=(window.innerHeight-24)/720;
  const scale=Math.max(1,Math.min(2,widthFit,heightFit));
  document.documentElement.style.setProperty("--ui-scale",scale.toFixed(3));
};
fitDashboard();
addEventListener("resize",fitDashboard);
const level=(value,target)=>Number(value||0)<=0?56:Math.max(72,Math.min(255,Math.round((Number(value||0)/Math.max(1,target))*255)));
const eta=x=>x?.etaDate?`${x.etaDate}（${n(x.etaDays)} 天）`:"暂无速度";
const rgbTracker=(a,r,c,act)=>{
  const map=rows=>new Map((rows||[]).map(x=>[x.date,x])),am=map(a),rm=map(r),cm=map(c),tm=map(act);
  const now=new Date(),year=now.getFullYear(),month=now.getMonth(),days=new Date(year,month+1,0).getDate();
  const firstDay=(new Date(year,month,1).getDay()+6)%7;
  const readingDailyTarget=780/days;
  const cells=[...['一','二','三','四','五','六','日'].map(x=>`<span class="weekday">${x}</span>`)];
  for(let i=0;i<firstDay;i++) cells.push('<span class="rgbDay empty"></span>');
  for(let i=1;i<=days;i++){
    const key=`${year}-${String(month+1).padStart(2,"0")}-${String(i).padStart(2,"0")}`;
    const rr=rm.get(key)||{}, aa=am.get(key)||{}, cc=cm.get(key)||{}, tt=tm.get(key)||{};
    const red=Math.max(level(rr.questions,readingDailyTarget),level(tt.readingMinutes,30));
    const green=Math.max(level(cc.minutes,30),level(tt.grammarMinutes,30));
    const blue=Math.max(level((aa.reviews||0)+(aa.new||0),20),level(tt.verbMinutes,20));
    cells.push(`<span class="rgbDay ${i>now.getDate()?'future':''}" style="--r:${red};--g:${green};--b:${blue}" title="${key} | Reading ${rr.questions||0} 题 / ${n(tt.readingMinutes||0,1)} 分钟 | Grammar ${n(cc.minutes||0,1)} 分钟 / ${n(tt.grammarMinutes||0,1)} 有效分钟 | Verb ${Number(aa.reviews||0)+Number(aa.new||0)} 次 / ${n(tt.verbMinutes||0,1)} 分钟"><span class="r"></span><span class="g"></span><span class="b"></span><b>${i}</b></span>`);
  }
  return `<div class="monthLabel">${year} 年 ${month+1} 月</div><div class="rgbCalendar">${cells.join("")}</div>`;
};
async function load(){
  const data=await fetch(`data/progress.json?t=${Date.now()}`).then(r=>r.json());
  const a=data.anki,c=data.course,r=data.reading,act=data.activity||{today:{readingMinutes:0,grammarMinutes:0,verbMinutes:0,totalMinutes:0,warnings:[]},history:[]};
  const pdf=c.pdf||{pages:0,totalPages:88,percent:0,todayPages:0,month:{recommendedToday:0,remaining:88,daysRemaining:0}};
  const pdfMonth=pdf.month||{};
  const readDone=(r.today.activityComplete||act.today.readingMinutes>0)?100:0;
  const verbDone=(a.today.activityComplete||act.today.verbMinutes>0)?100:0;
  const grammarDone=(c.today.activityComplete||act.today.grammarMinutes>0)?100:0;
  const daily=(readDone+verbDone+grammarDone)/3;
  document.querySelector("#updated").textContent=`更新于 ${new Date(data.updatedAt).toLocaleString("zh-CN")}`;
  document.querySelector("#dashboard").innerHTML=`
  <article class="card hero">
    <div class="sectionHead"><h2>今日活动完成度</h2><span class="muted">${n(data.today.focusMinutes)} 分钟已记录</span></div>
    <div class="overview"><div class="heroValue">${pct(daily)}</div><div><p class="muted">三项中任意一项留下记录即视为今日完成</p>${bar(daily)}<p class="details">Reading ${pct(readDone)} · Grammar ${pct(grammarDone)} · Verb ${pct(verbDone)}<br>有效时长：Reading ${n(act.today.readingMinutes,1)} 分钟 · Grammar ${n(act.today.grammarMinutes,1)} 分钟 · Verb ${n(act.today.verbMinutes,1)} 分钟 · 警告 ${n((act.today.warnings||[]).length)} 次</p></div></div>
    <div class="goalGrid">
      <div class="goal"><div class="goalTop"><h2>Reading</h2><span>月底前完成 20 Test</span></div><div class="goalValue">${n(r.today.questions)} / ${n(r.month.recommendedToday)} <span class="unit">今日动态建议</span></div>${bar(r.today.goalPercent)}<p class="details">本月 ${n(r.month.completed)} / ${n(r.month.target)} 题 · 剩余 ${n(r.month.remaining)}<br>昨日 ${n(r.month.yesterdayQuestions)} 题 · ETA ${eta({etaDate:r.month.etaDate,etaDays:r.month.etaDays})}</p></div>
      <div class="goal"><div class="goalTop"><h2>Grammar</h2><span>视频或 A1 讲义均可</span></div><div class="goalValue">${n(c.today.minutes,1)} <span class="unit">今日分钟</span></div>${bar(grammarDone)}<p class="details">视频 ${n(c.today.videoMinutes,1)} 分钟 · PDF ${n(c.today.pdfMinutes,1)} 分钟<br>A1 讲义今日 ${n(pdf.todayPages)} / ${n(pdfMonth.recommendedToday)} 页</p></div>
      <div class="goal"><div class="goalTop"><h2>Verb</h2><span>Anki 有记录即完成</span></div><div class="goalValue">${n(a.today.reviews)} <span class="unit">复习 · ${n(a.today.new)} 新卡</span></div>${bar(verbDone)}<p class="details">今日 ${n(a.today.minutes,1)} 分钟 · 连续 ${n(a.streak)} 天</p></div>
    </div>
  </article>
  <article class="card trackerCard"><div class="sectionHead"><h2>${new Date().getMonth()+1}月 RGB</h2><div class="legend"><span><i style="background:#f00"></i>阅读</span><span><i style="background:#0f0"></i>语法</span><span><i style="background:#00f"></i>动词</span></div></div>${rgbTracker(a.history,r.history,c.history,act.history||[])}</article>
  <article class="card wide readingPlan"><div class="sectionHead"><h2>阅读月底计划</h2><span class="muted">${r.month.deadline} 截止</span></div><div class="big">${n(r.month.completed)} / ${n(r.month.target)} <span class="unit">题</span></div>${bar(r.month.percent)}${stats([[n(r.month.recommendedToday),"今日建议"],[n(r.month.daysRemaining),"剩余天数"],[eta({etaDate:r.month.etaDate,etaDays:r.month.etaDays}),"按昨日速度 ETA"]])}</article>
  <article class="card"><div class="sectionHead"><h2>有效学习时长</h2><span class="muted">娱乐网站自动暂停</span></div><div class="big">${n(act.today.totalMinutes,1)} <span class="unit">分钟</span></div>${stats([[n(act.today.readingMinutes,1),"Reading"],[n(act.today.grammarMinutes,1),"Grammar"],[n(act.today.verbMinutes,1),"Verb"]])}<p class="details">Bilibili / YouTube / 抖音警告：${n((act.today.warnings||[]).length)} 次</p></article>
  <article class="card"><div class="sectionHead"><h2>Verb 具体记录</h2><span class="muted">Anki</span></div><div class="big">${n(a.today.reviews)} <span class="unit">次复习</span></div>${stats([[n(a.today.new),"新卡"],[n(a.today.minutes,1),"分钟"],[n(a.total.cards),"总卡片"]])}</article>
  <article class="card wide courseCard"><div class="sectionHead"><h2>视频课程累计</h2><span class="muted">${pct(c.total.percent)}</span></div><div class="courseRows">${c.courses.map(x=>`<div class="courseRow"><strong>${x.label}</strong>${bar(x.percent)}<span>${pct(x.percent)}</span></div>`).join("")}</div></article>
  <article class="card wide pdfCard"><div class="sectionHead"><h2>A1 讲义月底计划</h2><span class="muted">Acrobat 自动同步</span></div><div class="big">${n(pdf.pages)} / ${n(pdf.totalPages)} <span class="unit">页</span></div>${bar(pdf.percent)}${stats([[`${n(pdf.todayPages)} / ${n(pdfMonth.recommendedToday)}`,"今日推进 / 建议"],[n(pdfMonth.remaining),"剩余页数"],[eta(pdfMonth),"按昨日速度 ETA"]])}<p class="details">${pdfMonth.deadline||""} 前完成；关闭或翻页后由 Acrobat 恢复位置更新</p></article>`;
}
load().catch(e=>document.querySelector("#dashboard").innerHTML=`<article class="card hero"><h2>暂时没有进度数据</h2><p class="muted">${e.message}</p></article>`);
</script>
</body>
</html>
